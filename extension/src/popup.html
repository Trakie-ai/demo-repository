<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trakie</title>
  <link rel="stylesheet" href="../styles/popup.css" />
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div class="brand">
        <img class="brand-icon" src="../icons/logo.png" alt="Trakie logo" />
        <span class="brand-wordmark">trakie.ai</span>
      </div>
      <div id="status-pill" class="status-pill" data-status="connecting">
        <span class="status-dot"></span>
        <span class="status-text">Connecting…</span>
      </div>
    </header>

    <main class="content">
      <!-- Connecting view: QR code + hint -->
      <section id="connecting-view" class="connecting-view">
        <div id="qr-container" class="qr-container">
          <p class="qr-placeholder">QR code will appear here</p>
        </div>
        <p class="qr-hint">Scan this QR from your phone to start a session</p>
      </section>

      <!-- Live view: extraction panel -->
      <section id="live-view" class="live-view" hidden>
        <div id="status-badge" class="status-badge" data-mode="waiting">
          <span id="status-badge-label" class="status-badge-label">WAITING FOR CAPTURE</span>
          <span id="status-badge-count" class="status-badge-count"></span>
        </div>

        <ol id="capture-list" class="capture-list"></ol>
      </section>
    </main>
  </div>

  <script src="../dist/popup.js" type="module"></script>
</body>
</html>
